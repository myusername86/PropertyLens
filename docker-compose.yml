services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: arvsaas
      POSTGRES_USER: arvsaas
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arvsaas"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/ArvSaas.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=arvsaas;Username=arvsaas;Password=localdev
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
